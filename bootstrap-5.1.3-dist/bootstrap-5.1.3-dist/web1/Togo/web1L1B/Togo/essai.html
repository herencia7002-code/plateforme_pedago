<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Éclipse Solaire</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: radial-gradient(circle at center, #000010 30%, #000000 100%);
      overflow: hidden;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .sun {
      position: relative;
      width: 200px;
      height: 200px;
      background: radial-gradient(circle, #FFD700, #FFA500);
      border-radius: 50%;
      box-shadow: 0 0 60px 30px #FFD700;
    }
    .moon {
      position: absolute;
      width: 200px;
      height: 200px;
      background: #111;
      border-radius: 50%;
      top: 0;
      left: -250px;
      animation: eclipse 8s infinite ease-in-out;
    }
    @keyframes eclipse {
      0% {
        left: -250px;
      }
      50% {
        left: 25px;
      }
      100% {
        left: 250px;
      }
    }
    .corona {
      position: absolute;
      width: 300px;
      height: 300px;
      border: 4px solid rgba(255, 215, 0, 0.4);
      border-radius: 50%;
      top: -50px;
      left: -50px;
      animation: glow 2s infinite alternate;
    }
    @keyframes glow {
      from {
        transform: scale(1);
        opacity: 0.7;
      }
      to {
        transform: scale(1.1);
        opacity: 1;
      }
    }
  </style>
</head>
<body>
  <div class="sun">
    <div class="corona"></div>
    <div class="moon"></div>
  </div>
</body>
</html>
