{% extends "dashboard/base_dashboard.html" %}

{% block title %}
Matière
{% endblock %}

{% block page_title %}
Ajouter / Modifier une matière
{% endblock %}

{% block content %}

<div class="card shadow-sm border-0 rounded-4">
    <div class="card-header bg-white">
        <h5>Matière</h5>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            <div class="mb-3">
                <label class="form-label">Nom de la matière</label>
                    {{ form.nom }}
            </div>
            <div class="d-flex gap-2">
                <button class="btn btn-primary"><i class="bi bi-check-circle"></i>Enregistrer</button>
                <a href="{% url 'categories:matiere_list' %}" class="btn btn-secondary"><i class="bi bi-arrow-left"></i>Retour</a> 
            </div>
        </form>
    </div>
</div>

{% endblock %}
