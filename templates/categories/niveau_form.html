{% extends "dashboard/base_dashboard.html" %}

{% block title %}
{{ title }}
{% endblock %}

{% block page_title %}
{{ title }}
{% endblock %}

{% block content %}
<div class="card shadow-sm border-0 rounded-4">
    <div class="card-header bg-white">
        <h4> <i class="bi bi-diagram-3-fill"></i> {{ title }} </h4>
    </div>
    <div class="card-body">
        <form method="post">
            {% csrf_token %}
            {{ form.as_p }}
            <div class="mt-4">
                <button class="btn btn-success"><i class="bi bi-check-circle"></i>Enregistrer</button>
                <a href="{% url 'categories:niveau_list' %}" class="btn btn-secondary"> <i class="bi bi-arrow-left"></i>  Retour </a>
            </div>
        </form>
    </div>
</div>

{% endblock %}
